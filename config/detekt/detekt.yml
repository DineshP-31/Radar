build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

# ──────────────────────────────────────────────────────────────────────────────
# Formatting (delegated to ktlint via detekt-formatting)
# ──────────────────────────────────────────────────────────────────────────────
formatting:
  active: true
  android: true
  autoCorrect: true
  MaximumLineLength:
    active: false        # handled by the style rule below

# ──────────────────────────────────────────────────────────────────────────────
# Style
# ──────────────────────────────────────────────────────────────────────────────
style:
  active: true
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludeImportStatements: true
    excludeCommentStatements: true
  MagicNumber:
    active: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
    ignoreAnnotated:
      - 'Preview'
      - 'Composable'
  WildcardImport:
    active: true
    excludeImports:
      - 'kotlinx.coroutines.*'
  UnusedImports:
    active: true
  ReturnCount:
    active: true
    max: 3
  ForbiddenComment:
    active: false
  UnusedPrivateMember:
    active: true

# ──────────────────────────────────────────────────────────────────────────────
# Naming
# ──────────────────────────────────────────────────────────────────────────────
naming:
  active: true
  FunctionNaming:
    active: true
    # Allow PascalCase for Jetpack Compose @Composable functions
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
    excludes:
      - '**/ui/composable/**'
      - '**/ui/components/**'
      - '**/ui/navigation/**'
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'

# ──────────────────────────────────────────────────────────────────────────────
# Complexity
# ──────────────────────────────────────────────────────────────────────────────
complexity:
  active: true
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 8     # Compose functions can have many params
    constructorThreshold: 8
    ignoreAnnotated:
      - 'Composable'
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInObjects: 15
    excludes:
      - '**/test/**'
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  NestedBlockDepth:
    active: true
    threshold: 4

# ──────────────────────────────────────────────────────────────────────────────
# Coroutines
# ──────────────────────────────────────────────────────────────────────────────
coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  RedundantSuspendModifier:
    active: true
  SuspendFunWithFlowReturnType:
    active: true

# ──────────────────────────────────────────────────────────────────────────────
# Potential bugs
# ──────────────────────────────────────────────────────────────────────────────
potential-bugs:
  active: true
  LateinitUsage:
    active: false        # common pattern in Android (Views, tests)
  UnsafeCallOnNullableType:
    active: true
  UnreachableCode:
    active: true

# ──────────────────────────────────────────────────────────────────────────────
# Performance
# ──────────────────────────────────────────────────────────────────────────────
performance:
  active: true
  ArrayPrimitive:
    active: true
  SpreadOperator:
    active: false        # acceptable in small use-cases

# ──────────────────────────────────────────────────────────────────────────────
# Exceptions
# ──────────────────────────────────────────────────────────────────────────────
exceptions:
  active: true
  SwallowedException:
    active: true
  TooGenericExceptionCaught:
    active: true
  TooGenericExceptionThrown:
    active: true
  PrintStackTrace:
    active: true